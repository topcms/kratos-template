syntax = "proto3";

package kratos.template.v1;

import "google/protobuf/duration.proto";

option go_package = "github.com/topcms/kratos-template/internal/conf;conf";

// Bootstrap 对应全部配置文件的根结构（config.yaml + registry.yaml）。
message Bootstrap {
  Server   server   = 1;
  Data     data     = 2;
  Auth     auth     = 3;
  Registry registry = 4;
  Log      log      = 5;
}

// ── Server ─────────────────────────────────────────────────────────────────

message HTTP {
  string                   network = 1;
  string                   addr    = 2;
  google.protobuf.Duration timeout = 3;
}

message GRPC {
  string                   network = 1;
  string                   addr    = 2;
  google.protobuf.Duration timeout = 3;
}

message Server {
  HTTP http = 1;
  GRPC grpc = 2;
}

// ── Data ───────────────────────────────────────────────────────────────────

message Database {
  string                   driver            = 1;
  string                   source            = 2;
  // table_prefix 业务表统一前缀；cmd/gen 生成模型名/文件名时剥掉此前缀
  string                   table_prefix      = 3;
  int32                    max_idle_conns    = 4;
  int32                    max_open_conns    = 5;
  google.protobuf.Duration conn_max_lifetime = 6;
}

message Redis {
  string                   addr          = 1;
  string                   password      = 2;
  int32                    db            = 3;
  google.protobuf.Duration dial_timeout  = 4;
  google.protobuf.Duration read_timeout  = 5;
  google.protobuf.Duration write_timeout = 6;
}

message RemoteUserService {
  // service_name 必须与被调用服务的 kratos.Name 一致
  string                   service_name = 1;
  google.protobuf.Duration dial_timeout = 2;
}

message Remote {
  RemoteUserService user_service = 1;
}

message Data {
  Database database = 1;
  Redis    redis    = 2;
  Remote   remote   = 3;
}

// ── Auth ───────────────────────────────────────────────────────────────────

message JWT {
  bool            enabled        = 1;
  string          signing_method = 2;
  string          secret         = 3;
  string          issuer         = 4;
  repeated string audience       = 5;
}

message Auth {
  JWT jwt = 1;
}

// ── Log ────────────────────────────────────────────────────────────────────

message Log {
  // driver 当前只实现 zap，后续可扩展 slog/logrus
  string                   driver                = 1;
  // level: debug/info/warn/error
  string                   level                 = 2;
  // format: json/console
  string                   format                = 3;
  // output: stdout/stderr
  string                   output                = 4;
  bool                     caller                = 5;
  // mysql/redis 慢日志阈值
  google.protobuf.Duration slow_threshold        = 6;
  // 是否忽略 gorm record not found 错误日志
  bool                     ignore_record_not_found = 7;
}

// ── Registry ───────────────────────────────────────────────────────────────

message Consul {
  string                   address    = 1;
  string                   scheme     = 2;
  string                   token      = 3;
  google.protobuf.Duration wait_every = 4;
}

message Registry {
  // false：不连接注册中心、不注册服务；true：按 type/consul 启用注册与发现。
  bool enabled = 1;
  string type  = 2;
  Consul consul = 3;
}
