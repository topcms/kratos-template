server:
  http:
    addr: 0.0.0.0:8000
    timeout: 1s
  grpc:
    addr: 0.0.0.0:9000
    timeout: 1s
data:
  database:
    driver: mysql
    source: root:liu123456@tcp(127.0.0.1:3306)/kratos_demo?parseTime=True&loc=Local
    # 业务表统一前缀；gorm.io/gen 生成 Go 模型名/文件名时会剥掉此前缀
    table_prefix: "ts_"
    max_idle_conns: 10
    max_open_conns: 100
    conn_max_lifetime: 60s
  redis:
    addr: 127.0.0.1:6379
    password: ""
    db: 0
    dial_timeout: 1s
    read_timeout: 0.2s
    write_timeout: 0.2s
  remote:
    user_service:
      # discovery:///user.service 的 user.service 对应被调用服务在 kratos.New() 中配置的 kratos.Name
      service_name: user.service
      dial_timeout: 2s
auth:
  jwt:
    enabled: false
    signing_method: HS256
    secret: "please-change-me"
    issuer: "kratos-demo"
    audience:
      - "kratos-template"
log:
  # 当前实现：zap（后续可扩展 slog/logrus）
  driver: zap
  # debug / info / warn / error
  level: info
  # json / console
  format: json
  # stdout / stderr
  output: stdout
  caller: true
  # mysql/redis 慢日志阈值
  slow_threshold: 200ms
  # 是否忽略 gorm record not found 错误日志
  ignore_record_not_found: true
