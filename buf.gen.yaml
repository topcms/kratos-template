version: v2
# NOTE:
# 1) buf module config files (buf.yaml/buf.lock) live in ./proto
# 2) generation command runs from ./proto:
#      cd proto && buf generate --template ../buf.gen.yaml
# 3) therefore out must be ".." (repo root), so generated files land in:
#      kratos-template/api/...
#    If changed to ".", files will be generated into proto/api/... by mistake.
plugins:
  - local: protoc-gen-go
    out: ..
    opt:
      - paths=import
      - module=github.com/topcms/kratos-template
  - local: protoc-gen-go-grpc
    out: ..
    opt:
      - paths=import
      - module=github.com/topcms/kratos-template
  - local: protoc-gen-go-http
    out: ..
    opt:
      - paths=import
      - module=github.com/topcms/kratos-template

